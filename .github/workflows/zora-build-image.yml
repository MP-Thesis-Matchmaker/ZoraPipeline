name: Build and publish ZORA harvester image

# Publishing to GHCR means this container is pullable by anything with read
# access to the package: the harvest workflow, a teammate's laptop, a
# Kubernetes cluster, anything. `docker pull ghcr.io/<owner>/<repo>:latest`
# is all that's needed.
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "src/thesis_matchmaker/zora/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/mp-thesis-matchmaker/rag-thesis-matchmaker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use the lowercase image name from env to avoid GHCR case sensitivity issues.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
