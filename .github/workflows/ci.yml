name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/thesis_matchmaker/zora/ tests/zora/ scripts/

      - name: Run tests
        run: pytest tests/zora/ -v

      - name: Validate committed publications.jsonl against schema
        run: |
          if [ -f data/publications.jsonl ]; then
            python -m thesis_matchmaker.zora.output_schema data/publications.jsonl
          else
            echo "No data/publications.jsonl yet (expected before the first harvest run) — skipping"
          fi
